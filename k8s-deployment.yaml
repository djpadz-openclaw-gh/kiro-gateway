apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-gateway-multi
  namespace: kiro-multi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiro-gateway-multi
  template:
    metadata:
      labels:
        app: kiro-gateway-multi
    spec:
      containers:
      - name: kiro-gateway
        image: localhost:32000/kiro-gateway-multi:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9001
          name: http
        env:
        - name: PORT
          value: "9001"
        - name: KIRO_ACCOUNTS_JSON
          valueFrom:
            secretKeyRef:
              name: kiro-accounts
              key: accounts.json
        - name: PROXY_API_KEY
          valueFrom:
            secretKeyRef:
              name: kiro-gateway-secrets
              key: proxy-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/accounts
            port: 9001
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/accounts
            port: 9001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kiro-gateway-multi
  namespace: kiro-multi
spec:
  type: NodePort
  selector:
    app: kiro-gateway-multi
  ports:
  - port: 9001
    targetPort: 9001
    nodePort: 30901
    protocol: TCP
    name: http
