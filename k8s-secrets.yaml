apiVersion: v1
kind: Namespace
metadata:
  name: kiro-multi
---
apiVersion: v1
kind: Secret
metadata:
  name: kiro-accounts
  namespace: kiro-multi
type: Opaque
stringData:
  accounts.json: |
    {
      "accounts": [
        {
          "id": "account-1",
          "name": "Primary Account",
          "refreshToken": "YOUR_PRIMARY_REFRESH_TOKEN_HERE",
          "profileArn": "arn:aws:codewhisperer:us-east-1:123456789012:profile/default",
          "region": "us-east-1",
          "overage": false
        },
        {
          "id": "account-2",
          "name": "Secondary Account (Overage)",
          "refreshToken": "YOUR_SECONDARY_REFRESH_TOKEN_HERE",
          "profileArn": "arn:aws:codewhisperer:us-east-1:123456789012:profile/default",
          "region": "us-east-1",
          "overage": true
        }
      ],
      "healthCheckIntervalHours": 1
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: kiro-gateway-secrets
  namespace: kiro-multi
type: Opaque
stringData:
  proxy-api-key: "YOUR_PROXY_API_KEY_HERE"
