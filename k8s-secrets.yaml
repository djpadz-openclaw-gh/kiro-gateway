apiVersion: v1
kind: Namespace
metadata:
  name: kiro-multi
---
apiVersion: v1
kind: Secret
metadata:
  name: kiro-gateway-config
  namespace: kiro-multi
type: Opaque
stringData:
  # Proxy API Key (used for authentication to the gateway)
  PROXY_API_KEY: "YOUR_PROXY_API_KEY_HERE"
  
  # Health Check Configuration
  HEALTH_CHECK_INTERVAL_HOURS: "1"
  
  # Account Configuration
  # Add as many accounts as needed using the pattern: ACCOUNT_N_*
  # CONSTRAINT: Only one account should have OVERAGE set to "true"
  
  # Account 1 (Primary - no overage)
  ACCOUNT_1_REFRESH_TOKEN: "YOUR_ACCOUNT_1_REFRESH_TOKEN_HERE"
  ACCOUNT_1_NAME: "Primary Account"
  ACCOUNT_1_PROFILE_ARN: "arn:aws:codewhisperer:us-east-1:123456789012:profile/default"
  ACCOUNT_1_REGION: "us-east-1"
  ACCOUNT_1_OVERAGE: "false"
  
  # Account 2 (Secondary - with overage enabled)
  # Uncomment and fill in to add this account
  # ACCOUNT_2_REFRESH_TOKEN: "YOUR_ACCOUNT_2_REFRESH_TOKEN_HERE"
  # ACCOUNT_2_NAME: "Secondary Account (Overage)"
  # ACCOUNT_2_PROFILE_ARN: "arn:aws:codewhisperer:us-east-1:123456789012:profile/default"
  # ACCOUNT_2_REGION: "us-east-1"
  # ACCOUNT_2_OVERAGE: "true"
  
  # Account 3 (Additional - no overage)
  # Uncomment and fill in to add this account
  # ACCOUNT_3_REFRESH_TOKEN: "YOUR_ACCOUNT_3_REFRESH_TOKEN_HERE"
  # ACCOUNT_3_NAME: "Tertiary Account"
  # ACCOUNT_3_PROFILE_ARN: "arn:aws:codewhisperer:us-east-1:123456789012:profile/default"
  # ACCOUNT_3_REGION: "us-east-1"
  # ACCOUNT_3_OVERAGE: "false"
  
  # Add more accounts as needed (ACCOUNT_4, ACCOUNT_5, etc.)
  # Remember: Only ONE account can have OVERAGE set to "true"
